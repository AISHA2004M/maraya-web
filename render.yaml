# Render Blueprint Specification (render.yaml)
# ============================================
# Use this file to deploy the entire Vrital Web infrastructure (Database, Redis,
# and FastAPI Backend running both Uvicorn and Celery) to Render in one click.
#
# Reference: https://render.com/docs/blueprints-readme

services:
  # ─── FastAPI Backend Web Service ───────────────────────────────────────────
  - type: web
    name: vrital-api
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    port: 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vrital-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vrital-redis
          property: connectionString
      - key: API_BASE_URL
        sync: false # User will set their custom Render URL here (e.g. https://vrital-api.onrender.com)
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT key automatically
      - key: HF_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false

  # ─── KeyValue (Redis-compatible) Cache & Broker ────────────────────────────
  - type: keyvalue
    name: vrital-redis
    plan: free
    ipAllowList: [] # Only allow internal Render services to connect

# ─── PostgreSQL Production Database ─────────────────────────────────────────
databases:
  - name: vrital-db
    plan: free
