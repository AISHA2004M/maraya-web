# Render Blueprint Specification (render.yaml)
# ============================================
# Streamlined blueprint for FastAPI Web Service deployment.
# We configure Database and Redis URLs as environment variables to bypass
# region and free-tier account limits during automated blueprint verification.
#
# Reference: https://render.com/docs/blueprints-readme

services:
  # ─── FastAPI Backend Web Service ───────────────────────────────────────────
  - type: web
    name: vrital-api
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # User will paste their Postgres connection string here
      - key: REDIS_URL
        sync: false # User will paste their Redis connection string here (optional)
      - key: API_BASE_URL
        sync: false # User will set their custom Render URL here (e.g. https://vrital-api.onrender.com)
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT key automatically
      - key: HF_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
